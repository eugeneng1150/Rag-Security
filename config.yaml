# Choose model: "qwen" or "deepseek"
active_model: "deepseek"

models:
  qwen:
    base_url: "http://localhost:8082/v1"
    api_key: "not-needed"
    model_name: "qwen"
    temperature: 0.6
    max_tokens: 16000
  deepseek:
    base_url: "https://info-bq-mass-cohort-api-keys-finalv1.openai.azure.com/openai/v1"
    api_key: "${AZURE_OPENAI_API_KEY}"
    model_name: "DeepSeek-V3.2-BQ-Cohort"
    temperature: 0.6
    max_tokens: 4096

database:
  path: "data/employee.db"
  seed_employees: 20
  seed_private: 20

attacks:
  categories:
    - blocker
    - compliance_framing
    - fixed_output_structure
    - combined
  num_trials: 10

defense:
  anomaly_threshold: 0.5
  max_claims_per_response: 10

logging:
  results_dir: "results"
  verbose: true
